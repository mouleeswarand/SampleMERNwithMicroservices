apiVersion: apps/v1
kind: Deployment

metadata:
  name: hello-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: hello-service

  template:
    metadata:
      labels:
        app: hello-service

    spec:
      containers:
      - name: hello-service
        image: public.ecr.aws/b5a0w1i5/hello-service:latest

        ports:
        - containerPort: 3001